# Docker Compose para desenvolvimento local.
# Para produção, use variáveis de ambiente reais (não .env).
#
# Inicializar:
#   docker compose up -d
#   docker compose exec app composer install
#   docker compose exec app php artisan migrate --seed
#   docker compose exec app npm install && npm run build

services:

  # -------------------------------------------------------
  # Aplicação Laravel
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: scheduling_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
    networks:
      - scheduling_net
    depends_on:
      db:
        condition: service_healthy

  # -------------------------------------------------------
  # Nginx
  # -------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: scheduling_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - scheduling_net
    depends_on:
      - app

  # -------------------------------------------------------
  # MySQL
  # -------------------------------------------------------
  db:
    image: mysql:8.4
    container_name: scheduling_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      scheduling
      MYSQL_USER:          scheduling_user
      MYSQL_PASSWORD:      secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - scheduling_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  # -------------------------------------------------------
  # Redis (cache + filas)
  # -------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: scheduling_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - scheduling_net

  # -------------------------------------------------------
  # Worker de filas (para SyncCalendarJob)
  # -------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: scheduling_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --queue=calendars,default --sleep=3 --tries=3
    volumes:
      - .:/var/www
    networks:
      - scheduling_net
    depends_on:
      - app
      - db

  # -------------------------------------------------------
  # Mailpit (captura de e-mails em desenvolvimento)
  # -------------------------------------------------------
  mailpit:
    image: axllent/mailpit
    container_name: scheduling_mail
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI
    networks:
      - scheduling_net

networks:
  scheduling_net:
    driver: bridge

volumes:
  db_data:
